<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <!-- Background -->
  <rect width="60" height="60" rx="12" fill="#1a1a2e"/>

  <!-- Left side: JSON curly braces -->
  <text x="4" y="24" font-family="monospace" font-size="18" font-weight="bold" fill="#4a9eff">&#123;</text>
  <text x="4" y="42" font-family="monospace" font-size="18" font-weight="bold" fill="#4a9eff">&#125;</text>

  <!-- Right side: TOON label -->
  <text x="33" y="23" font-family="monospace" font-size="7" font-weight="bold" fill="#ff9f4a" letter-spacing="1">TOON</text>
  <!-- TOON line indicators -->
  <rect x="33" y="27" width="22" height="2.5" rx="1.2" fill="#ff9f4a" opacity="0.9"/>
  <rect x="33" y="32" width="17" height="2.5" rx="1.2" fill="#ff9f4a" opacity="0.7"/>
  <rect x="33" y="37" width="20" height="2.5" rx="1.2" fill="#ff9f4a" opacity="0.7"/>
  <rect x="33" y="42" width="14" height="2.5" rx="1.2" fill="#ff9f4a" opacity="0.5"/>

  <!-- Conversion arrows (bidirectional) -->
  <g fill="#ffffff" opacity="0.9">
    <!-- Right arrow → -->
    <polygon points="22,27 28,30 22,33" fill="#7fffb2"/>
    <!-- Left arrow ← -->
    <polygon points="28,34 22,37 28,40" fill="#ff7f9f"/>
  </g>

  <!-- Divider line -->
  <line x1="30" y1="10" x2="30" y2="52" stroke="#ffffff" stroke-width="0.5" opacity="0.15"/>
</svg>
